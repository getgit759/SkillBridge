<!-- src/main/resources/templates/learner/browse.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Browse Mentors – SkillBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">🎓 SkillBridge</a>
        <a href="/auth/logout" class="btn btn-outline-light btn-sm ms-auto">Logout</a>
    </div>
</nav>

<div class="container py-4">
    <h3 class="fw-bold mb-4"><i class="bi bi-search me-2"></i>Find Your Mentor</h3>

    <!-- Smart Match Search Bar -->
    <form th:action="@{/learner/browse}" method="get" class="card shadow-sm p-3 mb-4">
        <div class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-semibold">Skills (comma separated)</label>
                <input type="text" name="skills" class="form-control"
                       placeholder="e.g. Java, Spring Boot, MongoDB"
                       th:value="${param.skills}">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Max Budget ($/hr)</label>
                <input type="number" name="maxBudget" class="form-control"
                       placeholder="0 = any" th:value="${param.maxBudget}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-lightning-fill"></i> Smart Match
                </button>
            </div>
            <div class="col-md-2">
                <a href="/learner/browse" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset
                </a>
            </div>
        </div>
    </form>

    <!-- Mentor Cards -->
    <div class="row g-3">
        <div th:if="${mentors.empty}" class="col-12 text-center text-muted py-5">
            <i class="bi bi-emoji-frown fs-1"></i>
            <p class="mt-2">No mentors found. Try different skills.</p>
        </div>

        <div class="col-md-4" th:each="mp : ${mentors}">
            <div class="card h-100 shadow-sm hover-shadow">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-2">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center
                        justify-content-center fw-bold me-3"
                             style="width:48px;height:48px;font-size:1.3rem">
                            M
                        </div>
                        <div>
                            <h6 class="fw-bold mb-0" th:text="${mp.userId}">Mentor Name</h6>
                            <small class="text-muted" th:text="${mp.experienceYears} + ' yrs exp'"></small>
                        </div>
                    </div>

                    <!-- Skills badges -->
                    <div class="mb-2">
            <span th:each="skill : ${mp.skills}"
                  class="badge bg-primary me-1 mb-1" th:text="${skill}"></span>
                    </div>

                    <p class="text-muted small" th:text="${mp.bio}"></p>

                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fw-bold text-success" th:text="'$' + ${mp.hourlyRate} + '/hr'"></span>
                        <span>
              <i class="bi bi-star-fill text-warning"></i>
              <span th:text="${#numbers.formatDecimal(mp.avgRating, 1, 1)}">0.0</span>
              <small class="text-muted" th:text="'(' + ${mp.totalReviews} + ')'"></small>
            </span>
                    </div>
                </div>

                <!-- Book Session Modal Trigger -->
                <div class="card-footer bg-transparent">
                    <button class="btn btn-primary w-100"
                            data-bs-toggle="modal"
                            th:data-bs-target="'#bookModal-' + ${mp.id}">
                        <i class="bi bi-calendar-plus"></i> Book Session
                    </button>
                </div>
            </div>

            <!-- Booking Modal -->
            <div class="modal fade" th:id="'bookModal-' + ${mp.id}"
                 tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Book a Session</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action="@{/learner/book}" method="post">
                            <div class="modal-body">
                                <input type="hidden" name="mentorId" th:value="${mp.userId}">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Topic</label>
                                    <input type="text" name="topic" class="form-control"
                                           required placeholder="What do you want to learn?">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Date & Time</label>
                                    <input type="datetime-local" name="scheduledAt"
                                           class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Duration (minutes)</label>
                                    <select name="durationMinutes" class="form-select">
                                        <option value="30">30 min</option>
                                        <option value="60" selected>60 min</option>
                                        <option value="90">90 min</option>
                                        <option value="120">120 min</option>
                                    </select>
                                </div>
                                <div class="alert alert-info py-2 small">
                                    <i class="bi bi-credit-card me-1"></i>
                                    Payment: <strong>Mock (Free Demo)</strong> –
                                    hook Razorpay/Stripe for production.
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg"></i> Confirm Booking
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div><!-- /col -->
    </div><!-- /row -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
