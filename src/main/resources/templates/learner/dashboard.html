<!-- src/main/resources/templates/learner/dashboard.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Learner Dashboard – SkillBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">🎓 SkillBridge</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white" th:text="'Hello, ' + ${learner.name}"></span>
            <a href="/learner/browse" class="btn btn-warning btn-sm fw-bold">
                <i class="bi bi-search"></i> Find Mentors
            </a>
            <a href="/auth/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid py-4">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2">
            <div class="list-group shadow-sm">
                <a href="/learner/dashboard"
                   class="list-group-item list-group-item-action active">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
                <a href="/learner/browse"
                   class="list-group-item list-group-item-action">
                    <i class="bi bi-people me-2"></i> Browse Mentors
                </a>
            </div>
        </div>

        <!-- Main -->
        <div class="col-md-10">
            <!-- Alerts -->
            <div th:if="${param.booked}" class="alert alert-success alert-dismissible fade show">
                ✅ Session booked successfully!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Stats cards -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary shadow-sm text-center p-3">
                        <h2 class="fw-bold" th:text="${sessions.size()}">0</h2>
                        <p class="mb-0">Total Sessions</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success shadow-sm text-center p-3">
                        <h2 class="fw-bold" th:text="${certificates.size()}">0</h2>
                        <p class="mb-0">Certificates</p>
                    </div>
                </div>
            </div>

            <!-- Sessions table -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white fw-bold fs-5">
                    <i class="bi bi-calendar-check me-2"></i> My Sessions
                </div>
                <div class="card-body p-0">
                    <div th:if="${sessions.empty}" class="p-4 text-muted text-center">
                        No sessions yet.
                        <a href="/learner/browse">Browse mentors</a> to get started!
                    </div>
                    <table th:unless="${sessions.empty}"
                           class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Topic</th>
                            <th>Mentor</th>
                            <th>Scheduled</th>
                            <th>Status</th>
                            <th>Video Call</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s : ${sessions}">
                            <td th:text="${s.topic}"></td>
                            <td th:text="${s.mentorId}"></td>
                            <td th:text="${#temporals.format(s.scheduledAt,'dd MMM yyyy HH:mm')}"></td>
                            <td>
                  <span th:classappend="${s.status.name() == 'CONFIRMED'} ? 'badge bg-success' :
                                         (${s.status.name() == 'PENDING'}  ? 'badge bg-warning text-dark' :
                                         (${s.status.name() == 'COMPLETED'}? 'badge bg-secondary' :
                                          'badge bg-danger'))"
                        th:text="${s.status}"></span>
                            </td>
                            <td>
                                <a th:if="${s.meetingLink != null and s.status.name() == 'CONFIRMED'}"
                                   th:href="${s.meetingLink}" target="_blank"
                                   class="btn btn-sm btn-primary">
                                    <i class="bi bi-camera-video"></i> Join
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Certificates -->
            <!-- Find this section in learner/dashboard.html and replace entirely -->
            <div th:unless="${certificates.empty}" class="card shadow-sm">
                <div class="card-header bg-white fw-bold fs-5">
                    <i class="bi bi-award me-2"></i> My Certificates
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4" th:each="cert : ${certificates}">
                            <div class="card border-primary">
                                <div class="card-body text-center">
                                    <div class="fs-1">🏆</div>
                                    <h6 class="fw-bold" th:text="${cert.topic}"></h6>
                                    <p class="small text-muted"
                                       th:text="${cert.certificateNumber}"></p>

                                    <!-- ✅ MUST be /learner/ not /mentor/ -->
                                    <a th:href="@{/learner/certificate/{id}/download(id=${cert.sessionId})}"
                                       class="btn btn-outline-primary btn-sm">
                                        <i class="bi bi-download"></i> Download PDF
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /Main -->
    </div><!-- /Row -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
