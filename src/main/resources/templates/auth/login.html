<!-- src/main/resources/templates/auth/login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – SkillBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width:420px">
        <h3 class="text-center fw-bold text-primary mb-4">🎓 SkillBridge Login</h3>

        <div th:if="${param.registered}" class="alert alert-success py-2">
            ✅ Account created! Please log in.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2">
            You have been logged out.
        </div>
        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

        <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required placeholder="you@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" th:field="*{password}" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">
            Don't have an account?
            <a th:href="@{/auth/register}" class="text-primary fw-semibold">Register here</a>
        </p>
        <p class="text-center small text-muted mt-2">
            Admin: admin@skillbridge.com / Admin@123
        </p>
    </div>
</div>
</body>
</html>
