<!-- src/main/resources/templates/auth/register.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – SkillBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width:480px">
        <h3 class="text-center fw-bold text-primary mb-4">🎓 Create Account</h3>

        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

        <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" th:field="*{password}" class="form-control"
                       required minlength="6" placeholder="Min 6 characters">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">I want to join as</label>
                <select th:field="*{role}" class="form-select">
                    <option value="ROLE_LEARNER">🎓 Learner – find mentors</option>
                    <option value="ROLE_MENTOR">👨‍💼 Mentor – share my skills</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Create Account</button>
        </form>

        <p class="text-center mt-3 mb-0">
            Already have an account?
            <a th:href="@{/auth/login}" class="text-primary fw-semibold">Login</a>
        </p>
    </div>
</div>
</body>
</html>
